patterns:
  - name: "AWS Access Key"
    regex: "AKIA[0-9A-Z]{16}"
    severity: "critical"
    remediation: "Revoke the key and rotate to a new one. Store in AWS Secrets Manager or environment variables."
    cwe: "CWE-798"
  - name: "AWS Secret Key"
    regex: "[0-9a-zA-Z/+]{40}"
    severity: "critical"
    remediation: "Same as above."
    cwe: "CWE-798"
  - name: "GitHub Token"
    regex: "ghp_[0-9a-zA-Z]{36}"
    severity: "critical"
    remediation: "Revoke token and use environment variables or GitHub's secret scanning."
    cwe: "CWE-798"
  - name: "Generic API Key"
    regex: "(api[_-]?key|apikey|secret)[ :]?['\"]?[0-9a-zA-Z]{16,}['\"]?"
    severity: "high"
    remediation: "Remove hardcoded API keys and use configuration files or environment variables."
    cwe: "CWE-798"
  - name: "Password in Code"
    regex: "(password|passwd|pwd)[ :]?['\"]?[^'\"]{4,}['\"]?"
    severity: "high"
    remediation: "Never hardcode passwords. Use environment variables or secret management tools."
    cwe: "CWE-259"